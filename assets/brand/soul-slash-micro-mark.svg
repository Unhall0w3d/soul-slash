<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Soul slash</title>
  <desc id="desc">A silver S crossed by a violet slash inside a technical ward.</desc>
  <defs>
    <radialGradient id="field" cx="50%" cy="42%" r="68%">
      <stop offset="0" stop-color="#1b1731"/>
      <stop offset="0.58" stop-color="#0e1118"/>
      <stop offset="1" stop-color="#080a0e"/>
    </radialGradient>
    <linearGradient id="ward" x1="12" y1="52" x2="52" y2="12" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00e2d6"/>
      <stop offset="0.5" stop-color="#6e3ddf"/>
      <stop offset="1" stop-color="#ffb14a"/>
    </linearGradient>
    <linearGradient id="slash" x1="24" y1="52" x2="44" y2="12" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7a43f0"/>
      <stop offset="0.52" stop-color="#b074ff"/>
      <stop offset="1" stop-color="#efe4ff"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-40%" width="260%" height="180%">
      <feGaussianBlur stdDeviation="1.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#field)" stroke="#252b36" stroke-width="2"/>
  <circle cx="32" cy="32" r="23" fill="none" stroke="url(#ward)" stroke-width="1.25" opacity="0.92"/>
  <circle cx="32" cy="32" r="19" fill="none" stroke="#a898d3" stroke-width="0.65" opacity="0.38" stroke-dasharray="1.4 3.1"/>

  <g fill="#0a0d12" stroke-linecap="round">
    <path d="M32 6v6M32 52v6M6 32h6M52 32h6" stroke="#8e78c7" stroke-width="1"/>
    <circle cx="32" cy="9" r="1.6" stroke="#ffb14a" stroke-width="0.9"/>
    <circle cx="55" cy="32" r="1.6" stroke="#00e2d6" stroke-width="0.9"/>
    <circle cx="32" cy="55" r="1.6" stroke="#6e3ddf" stroke-width="0.9"/>
    <circle cx="9" cy="32" r="1.6" stroke="#00e2d6" stroke-width="0.9"/>
  </g>

  <path d="M42.2 19.1c-2.9-4-10.8-5.2-16-2.7-4.1 2-6.1 5.4-4.4 8.8 1.5 3 5.4 4.2 10.4 5.4 6.2 1.5 10.4 3.5 10.5 8.4.1 5.1-4.8 9-11.2 9.3-5.2.2-9.5-1.6-11.8-4.8" fill="none" stroke="#e6ecf1" stroke-width="3.25" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M43.8 12.5 24.2 51.5" fill="none" stroke="#6e3ddf" stroke-width="7" stroke-linecap="round" opacity="0.22" filter="url(#glow)"/>
  <path d="M43.8 12.5 24.2 51.5" fill="none" stroke="url(#slash)" stroke-width="4.1" stroke-linecap="round" filter="url(#glow)"/>
  <path d="m42.3 15.3 1.5-2.8-.1 3.2" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>
</svg>
