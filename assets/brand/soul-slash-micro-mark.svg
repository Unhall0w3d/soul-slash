<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Soul core</title>
  <desc id="desc">An ice-blue machine-soul path held within an asymmetrical aged-bronze core.</desc>
